name: EmoCare
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
   
  http: ^0.13.6
  path: ^1.9.1
  path_provider: ^2.1.5
  record: ^6.0.0
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/Logo12.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/Logo12.png"

  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/Logo12.png"

dependency_overrides:
  record_linux: ^1.0.0
